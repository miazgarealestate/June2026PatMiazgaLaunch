function daysSince(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}
function fmt(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-CA", { month: "short", day: "numeric", year: "numeric" });
}
function getUrgency(contact) {
  const days = CONTACT_DAYS[contact.stage];
  if (!days) return null;
  const ago = daysSince(contact.lastContact);
  if (ago === null) return "overdue";
  if (ago >= days) return "overdue";
  if (ago >= days * 0.75) return "soon";
  return "ok";
}
function stagePriority(stage) {
  return { A: 0, top50: 1, B: 2, "3day": 3, "11day": 4, top100: 5, C: 6 }[stage] ?? 99;
}

function Badge({ text, color }) {
  return (
    <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:12, fontSize:11, fontWeight:600, whiteSpace:"nowrap", background:color+"22", color, border:`1px solid ${color}44` }}>
      {text}
    </span>
  );
}
function Dot({ color }) {
  return <span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:color, flexShrink:0 }} />;
}
function SectionHead({ title }) {
  return <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:palette.warmMid, margin:"20px 0 10px" }}>{title}</div>;
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    try {
      navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
    } catch(e) {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); setCopied(true); setTimeout(() => setCopied(false), 2000);
    }
  }
  return (
    <button onClick={copy} style={{ padding:"4px 10px", borderRadius:6, border:`1px solid ${palette.border}`, background:copied?"#f0fdf4":palette.white, color:copied?"#16a34a":palette.warmMid, fontSize:11, cursor:"pointer", fontFamily:"Inter, sans-serif", flexShrink:0 }}>
      {copied ? "✓ Copied" : "Copy"}
    </button>
  );
}

function ContactCard({ contact, onClick }) {
  const info = STAGE_INFO[contact.stage] || {};
  const urg = getUrgency(contact);
  const ago = daysSince(contact.lastContact);
  return (
    <div onClick={() => onClick(contact)} style={{ background:palette.white, border:`1.5px solid ${urg==="overdue"?"#dc2626":palette.border}`, borderRadius:8, padding:"12px 14px", marginBottom:8, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
      <div style={{ minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3 }}>
          {urg==="overdue"&&<span>🔴</span>}{urg==="soon"&&<span>🟡</span>}{urg==="ok"&&<span>🟢</span>}{!urg&&<Dot color={info.color||palette.warmMid}/>}
          <span style={{ fontWeight:700, color:palette.ink, fontSize:15, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{contact.name}</span>
        </div>
        <div style={{ fontSize:12, color:palette.warmMid }}>
          {ago===null?"Never contacted":`Last contact: ${ago}d ago`}{contact.sourceGuide?` · ${contact.sourceGuide}`:""}
        </div>
        {contact.tags?.length>0&&<div style={{ marginTop:4, display:"flex", gap:4, flexWrap:"wrap" }}>{contact.tags.slice(0,3).map(t=><Badge key={t} text={t} color={palette.sand}/>)}</div>}
      </div>
      <div style={{ flexShrink:0, textAlign:"right" }}>
        <Badge text={info.label||contact.stage} color={info.color||palette.warmMid}/>
        {urg==="overdue"&&<div style={{ fontSize:10, color:"#dc2626", marginTop:3, fontWeight:700 }}>CALL TODAY</div>}
      </div>
    </div>
  );
}

function AllView({ contacts, onSelect }) {
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const filtered=contacts.filter(c=>{
    const q=search.toLowerCase();
    const ms=!q||c.name.toLowerCase().includes(q)||c.email?.toLowerCase().includes(q)||c.phone?.includes(q)||c.tags?.some(t=>t.toLowerCase().includes(q));
    const mf=filter==="all"||c.stage===filter||(filter==="unknown"&&STAGE_INFO[c.stage]?.group==="unknown")||(filter==="known"&&STAGE_INFO[c.stage]?.group==="known");
    return ms&&mf;
  }).sort((a,b)=>a.name.localeCompare(b.name));
  return (
    <div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, email, phone, tag…"

        {[["all","All"],["unknown","Leads"],["known","Sphere"],["A","A"],["B","B"],["C","C"],["top50","Top 50"],["pond","Pond"],["bad-lead","Bad"]].map(([val,lbl])=>(
          <button key={val} onClick={()=>setFilter(val)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", border:`1.5px solid ${filter===val?palette.accent:palette.border}`, background:filter===val?palette.accent:"white", color:filter===val?"white":palette.warmMid, fontFamily:"Inter, sans-serif" }}>{lbl}</button>
        ))}
      </div>
      <div style={{ fontSize:12, color:palette.warmMid, marginBottom:10 }}>{filtered.length} contacts</div>
      {filtered.length===0?<div style={{ textAlign:"center", color:palette.warmMid, padding:40, fontSize:14 }}>No contacts found</div>

function ContactModal({ contact, onClose, onLog, onUpdate, onDelete }) {
  const [logNote,setLogNote]=useState("");
  const [showLog,setShowLog]=useState(false);
  const [noteText,setNoteText]=useState(contact.notes||"");
  const [stageConfirm,setStageConfirm]=useState(null);
  const info=STAGE_INFO[contact.stage]||{};
  const urg=getUrgency(contact);
  const ago=daysSince(contact.lastContact);
  const days=CONTACT_DAYS[contact.stage];
  const urgBanner=urg==="overdue"
    ?{bg:"#fef2f2",border:"#fca5a5",color:"#991b1b",text:`⚠️ Overdue — contact standard is every ${days} days. Reach out today.`}
    :urg==="soon"
    ?{bg:"#fffbeb",border:"#fcd34d",color:"#92400e",text:`🔔 Due soon — last touch was ${ago} days ago (standard: ${days} days)`}
    :urg==="ok"
    ?{bg:"#f0fdf4",border:"#86efac",color:"#166534",text:`✓ On track — last contact ${ago}d ago`}
    :null;

  async function handleLog(method){
    await onLog(contact.id,method,logNote);
    setLogNote("");setShowLog(false);
  }
  async function confirmStage(stage){
    await onUpdate(contact.id,{stage});
    setStageConfirm(null);
  }
  function handleStageClick(stage){
    if(stage===contact.stage) return;
    const guidance=STAGE_GUIDANCE[stage];
    if(guidance) setStageConfirm({stage,guidance});
    else confirmStage(stage);
  }

  const unknownStages=["new","3day","11day","A","B","C","pond","bad-lead"];
  const knownStages=["top50","top100","sphere"];

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:400, display:"flex", alignItems:"flex-end" }}>
      <div style={{ background:palette.cream, width:"100%", maxHeight:"93vh", overflowY:"auto", borderRadius:"18px 18px 0 0", padding:"20px 18px 48px" }}>

        {stageConfirm&&(
          <div style={{ position:"sticky", top:0, zIndex:10, background:"#fffbeb", border:"1px solid #fcd34d", borderRadius:10, padding:14, marginBottom:16 }}>
            <div style={{ fontWeight:700, fontSize:13, color:"#92400e", marginBottom:6 }}>Moving to: {STAGE_INFO[stageConfirm.stage]?.label}</div>
            <div style={{ fontSize:13, color:"#92400e", marginBottom:12, lineHeight:1.5 }}>{stageConfirm.guidance}</div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>confirmStage(stageConfirm.stage)} style={{ flex:1, padding:9, background:palette.accent, color:"white", border:"none", borderRadius:8, cursor:"pointer", fontWeight:700, fontFamily:"Inter, sans-serif" }}>Confirm Move</button>
              <button onClick={()=>setStageConfirm(null)} style={{ flex:1, padding:9, background:palette.white, color:palette.stone, border:`1px solid ${palette.border}`, borderRadius:8, cursor:"pointer", fontFamily:"Inter, sans-serif" }}>Cancel</button>
            </div>
          </div>
        )}

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <div style={{ fontSize:24, fontFamily:"Cormorant Garamond, serif", fontWeight:700, color:palette.ink }}>{contact.name}</div>
            <div style={{ marginTop:4 }}><Badge text={info.label||contact.stage} color={info.color||palette.warmMid}/></div>
          </div>
          <button onClick={onClose} style={{ border:"none", background:"none", fontSize:26, cursor:"pointer", color:palette.warmMid }}>×</button>
        </div>

        {urgBanner&&(
          <div style={{ background:urgBanner.bg, border:`1px solid ${urgBanner.border}`, borderRadius:8, padding:"9px 12px", marginBottom:14, fontSize:13, color:urgBanner.color, fontWeight:500 }}>
            {urgBanner.text}
          </div>
        )}

        <div style={{ background:palette.white, borderRadius:10, padding:14, marginBottom:16 }}>
          {contact.email&&<a href={`mailto:${contact.email}`} style={{ display:"block", fontSize:14, color:palette.accent, marginBottom:8, textDecoration:"none" }}>📧 {contact.email}</a>}
          {contact.phone&&<a href={`tel:${contact.phone}`} style={{ display:"block", fontSize:14, color:palette.accent, marginBottom:8, textDecoration:"none" }}>📞 {contact.phone}</a>}
          {contact.sourceGuide&&<div style={{ fontSize:13, color:palette.warmMid, marginBottom:6 }}>📄 {contact.sourceGuide}</div>}
          <div style={{ fontSize:13, color:palette.warmMid, marginBottom:contact.tags?.length?6:0 }}>Added: {fmt(contact.addedDate)} · Last contact: {fmt(contact.lastContact)}</div>
          {contact.tags?.length>0&&<div style={{ marginTop:8, display:"flex", gap:5, flexWrap:"wrap" }}>{contact.tags.map(t=><Badge key={t} text={t} color={palette.sand}/>)}</div>}
        </div>

        <ScriptPanel contact={contact}/>

        <SectionHead title="Log Contact"/>
        {showLog?(
          <div style={{ background:palette.white, borderRadius:10, padding:14, marginBottom:16 }}>
            <input value={logNote} onChange={e=>setLogNote(e.target.value)} placeholder="Notes (optional — outcome, next step, anything relevant)"
              style={{ width:"100%", padding:"8px 12px", border:`1px solid ${palette.border}`, borderRadius:8, fontSize:13, marginBottom:10, boxSizing:"border-box", fontFamily:"Inter, sans-serif" }}/>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {["Call","Voicemail","Text","Email","Meeting","Other"].map(m=>(
                <button key={m} onClick={()=>handleLog(m)} style={{ padding:"9px 6px", background:palette.accent, color:"white", border:"none", borderRadius:8, fontSize:13, cursor:"pointer", fontWeight:600, fontFamily:"Inter, sans-serif" }}>{m}</button>
              ))}
            </div>
            <button onClick={()=>setShowLog(false)} style={{ marginTop:8, width:"100%", padding:8, background:"none", border:`1px solid ${palette.border}`, borderRadius:8, cursor:"pointer", color:palette.warmMid, fontSize:13, fontFamily:"Inter, sans-serif" }}>Cancel</button>
          </div>
        ):(
          <button onClick={()=>setShowLog(true)} style={{ width:"100%", padding:13, background:palette.accent, color:"white", border:"none", borderRadius:10, fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:16, fontFamily:"Inter, sans-serif" }}>
            + Log Contact
          </button>
        )}

        <SectionHead title="Pipeline Stage"/>
        <div style={{ fontSize:11, color:palette.warmMid, marginBottom:8, fontStyle:"italic" }}>
          Top 50/100 can move to A/B/C when ready to transact — move back after closing.
        </div>
        <div style={{ fontSize:12, fontWeight:600, color:palette.stone, marginBottom:6 }}>Lead Pipeline</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12 }}>
          {unknownStages.map(s=>{const si=STAGE_INFO[s];const a=contact.stage===s;return(
            <button key={s} onClick={()=>handleStageClick(s)} style={{ padding:"6px 10px", borderRadius:20, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"Inter, sans-serif", background:a?si.color:"transparent", color:a?"white":si.color, border:`1.5px solid ${si.color}` }}>{si.label}</button>
          );})}
        </div>
        <div style={{ fontSize:12, fontWeight:600, color:palette.stone, marginBottom:6 }}>Sphere</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:20 }}>
          {knownStages.map(s=>{const si=STAGE_INFO[s];const a=contact.stage===s;return(
            <button key={s} onClick={()=>handleStageClick(s)} style={{ padding:"6px 10px", borderRadius:20, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"Inter, sans-serif", background:a?si.color:"transparent", color:a?"white":si.color, border:`1.5px solid ${si.color}` }}>{si.label}</button>
          );})}
        </div>

        <SectionHead title="Notes"/>
        <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} rows={3} placeholder="Notes about this contact…"
          style={{ width:"100%", padding:"10px 12px", border:`1px solid ${palette.border}`, borderRadius:8, fontSize:13, resize:"vertical", boxSizing:"border-box", fontFamily:"Inter, sans-serif", marginBottom:8 }}/>
        <button onClick={()=>onUpdate(contact.id,{notes:noteText})} style={{ padding:"6px 14px", background:palette.peerBg, border:`1px solid ${palette.border}`, borderRadius:6, cursor:"pointer", fontSize:12, color:palette.stone, fontFamily:"Inter, sans-serif" }}>Save Notes</button>

        {contact.contactHistory?.length>0&&(
          <>
            <SectionHead title={`Contact History (${contact.contactHistory.length})`}/>
            <div style={{ background:palette.white, borderRadius:10, overflow:"hidden", marginBottom:20 }}>
              {[...contact.contactHistory].reverse().slice(0,8).map((h,i,arr)=>(
                <div key={i} style={{ padding:"10px 14px", borderBottom:i<arr.length-1?`1px solid ${palette.border}`:"none" }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontWeight:700, fontSize:13, color:palette.stone }}>{h.method}</span>
                    <span style={{ fontSize:11, color:palette.warmMid }}>{fmt(h.date)}</span>
                  </div>
                  {h.note&&<div style={{ fontSize:12, color:palette.warmMid, marginTop:3 }}>{h.note}</div>}
                </div>
              ))}
            </div>
          </>
        )}

        <div style={{ fontSize:11, color:palette.warmMid, marginBottom:8, fontStyle:"italic" }}>
          Travis's rule: never delete leads. Use "Bad Contact Info" stage instead — they may come back.
        </div>
        <button onClick={()=>{if(window.confirm(`Delete ${contact.name}?\n\nTravis recommends using "Bad Contact Info" stage instead of deleting. Leads sometimes come back.\n\nDelete anyway?`)) onDelete(contact.id);}} style={{ width:"100%", padding:10, background:"none", border:"1px solid #fca5a5", borderRadius:8, color:"#991b1b", cursor:"pointer", fontSize:13, fontFamily:"Inter, sans-serif" }}>
          Delete Contact
        </button>
      </div>
    </div>
  );
}

        <SectionHead title="Notes"/>
        <textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Initial notes…"
          style={{ width:"100%", padding:"10px 12px", border:`1px solid ${palette.border}`, borderRadius:8, fontSize:13, resize:"vertical", boxSizing:"border-box", fontFamily:"Inter, sans-serif", marginBottom:20 }}/>
        <button onClick={handleSubmit} style={{ width:"100%", padding:14, background:palette.accent, color:"white", border:"none", borderRadius:10, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"Inter, sans-serif" }}>
          Add Contact
        </button>
      </div>
    </div>
  );
}

function CRM() {
  const [contacts,setContacts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("today");
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get(STORAGE_KEY);if(r)setContacts(JSON.parse(r.value));}catch(_){}
      setLoading(false);
    })();
  },[]);

  async function persist(updated){setContacts(updated);try{await window.storage.set(STORAGE_KEY,JSON.stringify(updated));}catch(_){}}
  async function addContact(data){const c={...data,id:Date.now().toString(),addedDate:new Date().toISOString(),lastContact:null,contactHistory:[]};await persist([...contacts,c]);setShowAdd(false);setTab("today");}
  async function updateContact(id,updates){const updated=contacts.map(c=>c.id===id?{...c,...updates}:c);await persist(updated);setSelected(updated.find(c=>c.id===id)||null);}
  async function logContact(id,method,note){const entry={date:new Date().toISOString(),method,note};const updated=contacts.map(c=>c.id===id?{...c,lastContact:entry.date,contactHistory:[...(c.contactHistory||[]),entry]}:c);await persist(updated);setSelected(updated.find(c=>c.id===id)||null);}
  async function deleteContact(id){await persist(contacts.filter(c=>c.id!==id));setSelected(null);}

  const todayContacts=contacts.filter(c=>{const d=CONTACT_DAYS[c.stage];if(!d)return false;const a=daysSince(c.lastContact);return a===null||a>=d;}).sort((a,b)=>stagePriority(a.stage)-stagePriority(b.stage));
  const unknownContacts=contacts.filter(c=>STAGE_INFO[c.stage]?.group==="unknown");
  const knownContacts=contacts.filter(c=>STAGE_INFO[c.stage]?.group==="known");

  const tabs=[
    {id:"today",label:todayContacts.length>0?`Today (${todayContacts.length})`:"Today"},
    {id:"pipeline",label:"Pipeline"},
    {id:"sphere",label:"Sphere"},
    {id:"all",label:"All"},
    {id:"scripts",label:"Scripts"},
  ];

  if(loading) return <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:palette.cream, fontFamily:"Inter, sans-serif", color:palette.warmMid }}>Loading your pipeline…</div>;

  return (
    <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:palette.cream, fontFamily:"Inter, sans-serif", position:"relative" }}>
      <div style={{ background:palette.ink, padding:"14px 18px 12px", position:"sticky", top:0, zIndex:200 }}>
        <div style={{ fontSize:10, color:palette.sand, letterSpacing:2.5, textTransform:"uppercase", fontWeight:700 }}>Pat Miazga · RE/MAX All Points Realty</div>
        <div style={{ color:palette.white, fontSize:21, fontFamily:"Cormorant Garamond, serif", fontWeight:700, marginTop:1 }}>Pipeline CRM</div>
      </div>
      <div style={{ background:palette.white, borderBottom:`1px solid ${palette.border}`, display:"flex", position:"sticky", top:52, zIndex:190, overflowX:"auto" }}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{ flex:1, minWidth:60, padding:"11px 4px", border:"none", background:"none", cursor:"pointer", fontSize:12, fontWeight:tab===t.id?700:400, color:tab===t.id?palette.accent:palette.warmMid, borderBottom:tab===t.id?`2.5px solid ${palette.accent}`:"2.5px solid transparent", fontFamily:"Inter, sans-serif", whiteSpace:"nowrap" }}>{t.label}</button>
        ))}
      </div>
      <div style={{ padding:"16px 14px 100px" }}>
        {tab==="today"    &&<TodayView    contacts={todayContacts} allContacts={contacts} onSelect={setSelected}/>}
        {tab==="pipeline" &&<PipelineView contacts={unknownContacts} onSelect={setSelected}/>}
        {tab==="sphere"   &&<SphereView   contacts={knownContacts} onSelect={setSelected}/>}
        {tab==="all"      &&<AllView      contacts={contacts} onSelect={setSelected}/>}
        {tab==="scripts"  &&<ScriptsView/>}
      </div>
      <button onClick={()=>setShowAdd(true)} style={{ position:"fixed", bottom:28, right:20, width:54, height:54, borderRadius:"50%", background:palette.accent, color:"white", border:"none", fontSize:26, cursor:"pointer", boxShadow:"0 4px 16px rgba(0,0,0,0.25)", zIndex:300, lineHeight:1, fontFamily:"Inter, sans-serif" }}>+</button>
      {selected&&<ContactModal contact={selected} onClose={()=>setSelected(null)} onLog={logContact} onUpdate={updateContact} onDelete={deleteContact}/>}
      {showAdd&&<AddModal onAdd={addContact} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}


// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(CRM));

</script>
</body>
</html>
